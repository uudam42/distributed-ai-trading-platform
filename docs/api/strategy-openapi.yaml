openapi: 3.1.0
info:
  title: Strategy Service
  version: 0.1.0
paths:
  /strategies:
    post:
      summary: Register strategy
      responses:
        '201': { description: Strategy registered }
    get:
      summary: List strategies
      responses:
        '200': { description: Strategies returned }
  /strategies/{strategyId}/backtests:
    post:
      summary: Start hftbacktest run
      parameters:
        - in: path
          name: strategyId
          required: true
          schema: { type: string, format: uuid }
      responses:
        '202': { description: Backtest requested }
  /strategies/{strategyId}/instances:
    post:
      summary: Start paper/live strategy instance
      parameters:
        - in: path
          name: strategyId
          required: true
          schema: { type: string, format: uuid }
      responses:
        '202': { description: Strategy instance start requested }
